---
layout: default
---

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="col-lg-10 mx-auto mt-5">

  <h1 class="mb-1">{{ page.title }}</h1>

  <div class="mb-2">
    {% if page.trip_type == "road" %}
      <span class="badge badge-success">🚗 Road Trip</span>
    {% elsif page.trip_type == "flight" %}
      <span class="badge badge-primary">✈️ Flight</span>
    {% else %}
      <span class="badge badge-secondary">📍 Place</span>
    {% endif %}

    {% if page.date %}
      <span class="text-muted ml-2" style="font-size:0.9rem;">{{ page.date | date: "%B %Y" }}</span>
    {% endif %}

    {% for tag in page.tags %}
      <span class="badge badge-light ml-1">{{ tag }}</span>
    {% endfor %}
  </div>

  <div id="trip-map" style="height: 400px; border-radius: 8px; margin-bottom: 2rem;"></div>

  <div class="markdown-body">
    {{ content }}
  </div>

</div>

<script>
(function () {
  var stops = {{ page.stops | jsonify }};
  var tripType = {{ page.trip_type | jsonify }};

  var map = L.map('trip-map');

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(map);

  if (!stops || stops.length === 0) return;

  var markerIcon = L.icon({
    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
    iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
  });

  var latlngs = stops.map(function (s) { return [s.lat, s.lng]; });

  stops.forEach(function (s, i) {
    var label = s.label || ('Stop ' + (i + 1));
    L.marker([s.lat, s.lng], { icon: markerIcon })
      .addTo(map)
      .bindPopup('<strong>' + label + '</strong>');
  });

  if (stops.length === 1) {
    map.setView(latlngs[0], 10);

  } else if (tripType === 'road') {
    L.polyline(latlngs, { color: '#007bff', weight: 3, opacity: 0.8 }).addTo(map);
    map.fitBounds(L.latLngBounds(latlngs).pad(0.2));

  } else if (tripType === 'flight') {
    // Great-circle arc via interpolated points
    var arc = [];
    var n = 80;
    var p1 = { lat: latlngs[0][0] * Math.PI / 180, lng: latlngs[0][1] * Math.PI / 180 };
    var p2 = { lat: latlngs[latlngs.length - 1][0] * Math.PI / 180, lng: latlngs[latlngs.length - 1][1] * Math.PI / 180 };
    var d = 2 * Math.asin(Math.sqrt(
      Math.pow(Math.sin((p2.lat - p1.lat) / 2), 2) +
      Math.cos(p1.lat) * Math.cos(p2.lat) * Math.pow(Math.sin((p2.lng - p1.lng) / 2), 2)
    ));
    for (var i = 0; i <= n; i++) {
      var f = i / n;
      if (d === 0) { arc.push(latlngs[0]); continue; }
      var A = Math.sin((1 - f) * d) / Math.sin(d);
      var B = Math.sin(f * d) / Math.sin(d);
      var x = A * Math.cos(p1.lat) * Math.cos(p1.lng) + B * Math.cos(p2.lat) * Math.cos(p2.lng);
      var y = A * Math.cos(p1.lat) * Math.sin(p1.lng) + B * Math.cos(p2.lat) * Math.sin(p2.lng);
      var z = A * Math.sin(p1.lat) + B * Math.sin(p2.lat);
      var lat = Math.atan2(z, Math.sqrt(x * x + y * y)) * 180 / Math.PI;
      var lng = Math.atan2(y, x) * 180 / Math.PI;
      arc.push([lat, lng]);
    }
    L.polyline(arc, { color: '#007bff', weight: 2, opacity: 0.8, dashArray: '6 6' }).addTo(map);
    map.fitBounds(L.latLngBounds(latlngs).pad(0.3));

  } else {
    map.fitBounds(L.latLngBounds(latlngs).pad(0.2));
  }
})();
</script>
